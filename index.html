<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/trust-export/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TrustAuto</title>

    <script>
      (function() {
        try {
          const theme = localStorage.getItem('color-theme');
          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (e) {}
      })();
    </script>

    <link rel="manifest" href="./manifest.json">
    <script type="module" crossorigin src="/trust-export/assets/index-BWdS0K8g.js"></script>
    <link rel="stylesheet" crossorigin href="/trust-export/assets/index-VGlA6rlJ.css">
  </head>
  <body>
    <div id="root"></div>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
